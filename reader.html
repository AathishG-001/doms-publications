<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reader — DoMS Publications</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --ink-muted: #6b6b6b;
      --paper: #f7f4ef;
      --paper-card: #fdfcfa;
      --accent: #8b1a1a;
      --border: #e0dbd3;
      --toolbar-h: 56px;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: #3a3a3a;
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOOLBAR */
    .toolbar {
      height: var(--toolbar-h);
      background: #1e1e1e;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 1rem;
      flex-shrink: 0;
      border-bottom: 1px solid #333;
    }

    .toolbar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #bbb;
      font-size: 0.82rem;
      text-decoration: none;
      padding: 6px 12px 6px 0;
      border-right: 1px solid #333;
      margin-right: 1rem;
      white-space: nowrap;
      transition: color 0.15s;
    }

    .toolbar-back:hover { color: #fff; }

    .toolbar-title {
      color: #ddd;
      font-size: 0.88rem;
      font-weight: 400;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .tb-btn {
      background: none;
      border: none;
      color: #bbb;
      width: 36px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-size: 0.8rem;
      font-family: var(--sans);
    }

    .tb-btn:hover { background: #333; color: #fff; }
    .tb-btn:disabled { opacity: 0.35; cursor: default; }
    .tb-btn:disabled:hover { background: none; color: #bbb; }

    .tb-sep { width: 1px; height: 24px; background: #333; margin: 0 4px; }

    .page-indicator {
      font-size: 0.78rem;
      color: #999;
      min-width: 80px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .zoom-select {
      background: #333;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 4px;
      font-size: 0.78rem;
      padding: 4px 8px;
      cursor: pointer;
      font-family: var(--sans);
    }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-family: var(--sans);
      cursor: pointer;
      transition: opacity 0.15s;
      margin-left: 8px;
      text-decoration: none;
      white-space: nowrap;
    }

    .download-btn:hover { opacity: 0.85; }

    /* CANVAS AREA */
    .reader-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .page-wrapper {
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .page-wrapper canvas {
      display: block;
    }

    .page-num-overlay {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 0.68rem;
      color: rgba(0,0,0,0.4);
      font-family: var(--sans);
    }

    /* LOADING */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 100;
    }

    .loading-screen.hidden { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid #444;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen p {
      color: #888;
      font-size: 0.82rem;
    }

    /* ERROR */
    .error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #2a2a2a;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }

    .error-screen.show { display: flex; }
    .error-screen h2 { color: #ddd; font-size: 1.1rem; font-weight: 500; }
    .error-screen p { color: #888; font-size: 0.85rem; max-width: 360px; line-height: 1.6; }

    /* THUMBNAIL SIDEBAR (optional, hidden by default) */
    .sidebar {
      width: 120px;
      background: #252525;
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      border-right: 1px solid #333;
    }

    .sidebar.open { display: flex; }

    .thumb-item {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 2px;
      transition: border-color 0.15s;
    }

    .thumb-item.active { border-color: var(--accent); }
    .thumb-item canvas { width: 100%; display: block; }

    .reader-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      .toolbar-title { display: none; }
      .zoom-select { display: none; }
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <p>Loading document…</p>
</div>

<div class="error-screen" id="error">
  <h2>Unable to load document</h2>
  <p id="error-msg">The PDF file could not be found or loaded. Please check that the file exists in the repository.</p>
  <a href="index.html" style="color: #c06060; font-size:0.85rem;">← Back to publications</a>
</div>

<div class="toolbar">
  <a class="toolbar-back" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Publications
  </a>
  <span class="toolbar-title" id="doc-title">Loading…</span>
  <div class="toolbar-controls">
    <button class="tb-btn" id="btn-prev" title="Previous page" disabled onclick="prevPage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="page-indicator" id="page-indicator">— / —</span>
    <button class="tb-btn" id="btn-next" title="Next page" disabled onclick="nextPage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" title="Zoom out" onclick="changeZoom(-0.25)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <select class="zoom-select" id="zoom-select" onchange="setZoom(parseFloat(this.value))">
      <option value="0.5">50%</option>
      <option value="0.75">75%</option>
      <option value="1" selected>100%</option>
      <option value="1.25">125%</option>
      <option value="1.5">150%</option>
      <option value="2">200%</option>
    </select>
    <button class="tb-btn" title="Zoom in" onclick="changeZoom(0.25)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
    </button>
    <div class="tb-sep"></div>
    <a class="download-btn" id="download-btn" href="#" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
  </div>
</div>

<div class="reader-body">
  <div class="reader-area" id="reader-area"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params = new URLSearchParams(window.location.search);
  const pdfFile = params.get('file') || '';
  const pdfTitle = params.get('title') || 'Document';

  document.title = pdfTitle + ' — DoMS Publications';
  document.getElementById('doc-title').textContent = pdfTitle;
  document.getElementById('download-btn').href = pdfFile;
  document.getElementById('download-btn').download = pdfFile.split('/').pop();

  let pdfDoc = null;
  let scale = 1.0;
  let currentPage = 1;
  const canvases = [];

  const readerArea = document.getElementById('reader-area');

  async function loadPDF() {
    if (!pdfFile) {
      showError('No file specified in the URL.');
      return;
    }

    try {
      pdfDoc = await pdfjsLib.getDocument(pdfFile).promise;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('btn-prev').disabled = false;
      document.getElementById('btn-next').disabled = false;
      updatePageIndicator();
      renderAllPages();
    } catch(e) {
      showError('Could not load: ' + pdfFile + '. Make sure the PDF is in the correct folder in your GitHub repository.');
    }
  }

  async function renderAllPages() {
    readerArea.innerHTML = '';
    canvases.length = 0;

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale });

      const wrapper = document.createElement('div');
      wrapper.className = 'page-wrapper';
      wrapper.id = 'page-' + i;

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const numLabel = document.createElement('div');
      numLabel.className = 'page-num-overlay';
      numLabel.textContent = i;

      wrapper.appendChild(canvas);
      wrapper.appendChild(numLabel);
      readerArea.appendChild(wrapper);
      canvases.push(canvas);

      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
    }

    setupScrollObserver();
  }

  function setupScrollObserver() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          const num = parseInt(id.replace('page-', ''));
          if (num !== currentPage) {
            currentPage = num;
            updatePageIndicator();
          }
        }
      });
    }, { root: readerArea, threshold: 0.4 });

    document.querySelectorAll('.page-wrapper').forEach(w => observer.observe(w));
  }

  function updatePageIndicator() {
    if (!pdfDoc) return;
    document.getElementById('page-indicator').textContent = `${currentPage} / ${pdfDoc.numPages}`;
    document.getElementById('btn-prev').disabled = currentPage <= 1;
    document.getElementById('btn-next').disabled = currentPage >= pdfDoc.numPages;
  }

  function scrollToPage(n) {
    const el = document.getElementById('page-' + n);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function prevPage() {
    if (currentPage > 1) { currentPage--; scrollToPage(currentPage); updatePageIndicator(); }
  }

  function nextPage() {
    if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; scrollToPage(currentPage); updatePageIndicator(); }
  }

  function setZoom(z) {
    scale = Math.max(0.25, Math.min(3, z));
    document.getElementById('zoom-select').value = scale;
    renderAllPages();
  }

  function changeZoom(delta) {
    setZoom(Math.round((scale + delta) * 4) / 4);
  }

  function showError(msg) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error').classList.add('show');
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
  });

  loadPDF();
</script>
</body>
</html>
